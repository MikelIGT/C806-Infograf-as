<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>C806 | Commissioning checklist · INGETEAM</title>
<style>
:root{
  --bg1:#f4f6ff; --bg2:#e9efff;
  --panel:#ffffff; --panel2:#f7f8fc; --line:#d7deee;
  --text:#0b1220; --muted:#40506b;
  --g:#22c55e; --y:#f59e0b; --r:#f87171; --a:#6d28d9;
  --rp:#fca5a5; /* pastel red */
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(900px 520px at 12% 0%, rgba(109,40,217,.12) 0%, transparent 60%), radial-gradient(900px 520px at 88% 10%, rgba(252,165,165,.10) 0%, transparent 55%), linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--text)}
header{padding:18px 16px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(255,255,255,.90);backdrop-filter:blur(10px);z-index:10}
.hrow{display:flex;gap:12px;align-items:end;flex-wrap:wrap;justify-content:space-between}
h1{margin:0;font-size:16px;letter-spacing:.2px}
.meta{color:var(--muted);font-size:12px;margin-top:6px;display:flex;gap:12px;flex-wrap:wrap}
.toolbar{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input{flex:1;min-width:260px;background:#fff;border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:12px;outline:none}
.toggle{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);padding:8px 10px;border:1px solid var(--line);border-radius:12px;background:#fff;}
.toggle input{width:16px;height:16px;min-width:auto;flex:0;padding:0;border-radius:4px}
main{padding:0 16px 18px;max-width:1320px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin:14px 0 16px}
.kpi{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:16px;padding:12px}
.kpi .t{font-size:12px;color:var(--muted)}
.kpi .v{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-top:6px}
.kpi .pct{font-size:22px;font-weight:700;letter-spacing:.2px}
.dot{width:10px;height:10px;border-radius:999px;display:inline-block}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:12px}
.card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:18px;padding:14px}
.summary{display:flex;justify-content:space-between;align-items:center;gap:10px;user-select:none}
.summary h2{margin:0;font-size:13px;color:var(--text)}
.badgePct{font-size:12px;color:var(--muted);cursor:pointer}
.bar{height:10px;background:rgba(159,176,208,.14);border:1px solid var(--line);border-radius:999px;overflow:hidden;margin:10px 0 10px}
.fill{height:100%;width:0%;background:linear-gradient(90deg,var(--a),var(--g))}

.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 10px}
.tab{cursor:pointer;user-select:none;font-size:12px;color:var(--text);border:1px solid var(--line);background:#fff;padding:7px 10px;border-radius:999px}
.tab.active{background:rgba(124,58,237,.20);border-color:rgba(124,58,237,.45)}

.pssb{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.sub{border:1px solid var(--line);border-radius:16px;padding:10px;background:#fff}
.sub h3{margin:0 0 8px;font-size:12px;color:var(--text);display:flex;justify-content:space-between;align-items:center}

.list{display:grid;gap:6px;margin-top:8px}
.item{display:flex;justify-content:space-between;gap:10px;padding:8px 10px;border:1px solid var(--line);border-radius:12px;background:#fff}
.item .k{font-size:12px;color:var(--muted);line-height:1.25}
.badge{font-size:11px;padding:3px 8px;border-radius:999px;border:1px solid var(--line);white-space:nowrap;color:var(--text);background:#fff}
.badge.x{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.55);color:#166534;font-weight:700}
.badge.todo{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.35);color:#7f1d1d}
.badge.na{background:rgba(159,176,208,.14);border-color:#cbd5e1;color:#334155}

.details{margin-top:8px}
.details[hidden]{display:none}

@media (max-width: 760px){ .pssb{grid-template-columns:1fr;} }

.switchWrap{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.75);} 
.switchLabel{font-size:12px;color:var(--muted);}
.switch{width:46px;height:26px;border-radius:999px;border:1px solid var(--line);background:linear-gradient(180deg,#fff,#f5f7ff);position:relative;cursor:pointer;}
.switch .knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:999px;background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);transition:transform .18s ease, background .18s ease;}
.switch[aria-pressed="true"]{background:linear-gradient(180deg, rgba(34,197,94,.25), rgba(34,197,94,.12));border-color:rgba(34,197,94,.35);} 
.switch[aria-pressed="true"] .knob{transform:translateX(20px);background:linear-gradient(180deg,#dcfce7,#bbf7d0);border-color:rgba(34,197,94,.35);}

.brandRow{display:flex;align-items:center;gap:12px}
.brandLogo{height:34px;width:auto;display:block}
.brandTitles h1{margin:0;font-size:16px;letter-spacing:.2px}
.brandSub{margin-top:2px;font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.6px}

/* Progress: gradient only up to pct (fill element), dots match gradient */
:root{--prog0:#ef4444;--prog1:#3b82f6;}
.bar{background:rgba(148,163,184,.18);border-color:rgba(34,48,83,.18);}
.fill{background:linear-gradient(90deg, var(--prog0) 0%, var(--prog1) 100%);}
.dot{background:var(--dot, var(--prog0));}
</style>
</head>

function groupPct(area){
  if(!area || area.type!=='group') return (area && area.pct) || 0;
  const gs=area.groups||{};
  let acc=0, n=0;
  for(const g of Object.values(gs)){
    let p=null;
    if(g.type==='pssb' && g.pct_ps!=null && g.pct_sb!=null){ p=(Number(g.pct_ps)+Number(g.pct_sb))/2; }
    else if(typeof g.pct==='number'){ p=g.pct; }
    if(p!=null && !isNaN(p)){ acc+=p; n++; }
  }
  return n? (acc/n) : ((area.pct)||0);
}

function dotColor(p){
  if(p>=75) return 'var(--g)';
  if(p>=40) return 'var(--y)';
  return 'var(--r)';
}

function lerp(a,b,t){ return a + (b-a)*t; }
function hexToRgb(h){
  const m=(h||'').trim().replace('#','');
  const hex = (m.length===3) ? m.split('').map(ch=>ch+ch).join('') : m;
  const n=parseInt(hex,16);
  return {r:(n>>16)&255, g:(n>>8)&255, b:n&255};
}
function rgbToCss(r,g,b){ return `rgb(${Math.round(r)}, ${Math.round(g)}, ${Math.round(b)})`; }
function dotFromPct(p){
  const c0=getComputedStyle(document.documentElement).getPropertyValue('--prog0').trim() || '#9f1239';
  const c1=getComputedStyle(document.documentElement).getPropertyValue('--prog1').trim() || '#15803d';
  const t=Math.max(0, Math.min(1, (p||0)/100));
  const a=hexToRgb(c0), b=hexToRgb(c1);
  return rgbToCss(lerp(a.r,b.r,t), lerp(a.g,b.g,t), lerp(a.b,b.b,t));
}

function clampPct(p){
  if(p===null || p===undefined || isNaN(p)) return 0;
  return Math.max(0, Math.min(100, p));
}
function badge(s){
  if(!s) return '';
  const s2=(''+s).replace(/\s+/g,'');
  if(s2==='X') return '<span class="badge x">OK</span>';
  if(s2==='N.A.'||s2==='N.A') return '<span class="badge na">N/A</span>';
  return '<span class="badge">'+s+'</span>';
}
function isOk(st){
  return (''+(st||'')).replace(/\s+/g,'')==='X';
}
function isOkPSSB(ps,sb){
  return isOk(ps) && isOk(sb);
}

function render(){
  const q='';
  const onlyPending = (document.getElementById('onlyPendingBtn')?.getAttribute('aria-pressed') === 'true');
  const kpis=document.getElementById('kpis');
  const grid=document.getElementById('grid');

  grid.innerHTML='';

  const areasOrder=['MSB 440','PMS','DRIVES','MOTORS','SAFETY SYSTEM','EMS','TRAFOS','BATTERIES','REMOTE ACCESS BOX'];

  for(const areaName of areasOrder){
    const area=model.areas[areaName];
    if(!area) continue;

    const pct = (area && area.type==='group') ? groupPct(area) : (area.pct ?? 0);
    const k=document.createElement('div');
    k.className='kpi';
    k.innerHTML = '<div class="t">'+areaName+'</div>'+
      '<div class="v"><div class="pct">'+Math.round(pct)+'%</div>'+
      '<div class="t"><span class="dot" style="background:'+dotColor(pct)+'"></span></div></div>';
    try{ const d=k.querySelector('.dot'); if(d){ d.style.background = dotFromPct(pct); } }catch(e){}
    kpis.appendChild(k);

    const card=document.createElement('div');
    card.className='card';

    const summary=document.createElement('div');
    summary.className='summary';
    summary.innerHTML = '<h2>'+areaName+'</h2>'+
      '<span class="badgePct" title="Click para desplegar/plegar">'+Math.round(pct)+'% ▾</span>';
    card.appendChild(summary);

    const bar=document.createElement('div');
    bar.className='bar';
    const fill=document.createElement('div');
    fill.className='fill';
    fill.style.width = clampPct(pct) + '%';
    bar.appendChild(fill);
    card.appendChild(bar);

    const details=document.createElement('div');
    details.className='details';
    details.hidden=true;
    card.appendChild(details);

    const pctEl=summary.querySelector('.badgePct');
    pctEl.addEventListener('click', (ev)=>{
      ev.stopPropagation();
      details.hidden = !details.hidden;
      pctEl.textContent = Math.round(pct) + '% ' + (details.hidden ? '▾' : '▴');
    });

    function renderPSSB(items, pct_ps, pct_sb){
      const wrap=document.createElement('div');
      wrap.className='pssb';

      const ps=document.createElement('div');
      ps.className='sub';
      ps.innerHTML = '<h3><span>PS (Portside)</span><span class="badgePct">'+(pct_ps??'')+'%</span></h3>';
      const sb=document.createElement('div');
      sb.className='sub';
      sb.innerHTML = '<h3><span>SB (Starboard)</span><span class="badgePct">'+(pct_sb??'')+'%</span></h3>';

      const lps=document.createElement('div'); lps.className='list';
      const lsb=document.createElement('div'); lsb.className='list';

      const filtered=(items||[]).filter(it=>{
        const matchQ = (!q || (it.label||'').toLowerCase().includes(q) || (it.ps||'').toLowerCase().includes(q) || (it.sb||'').toLowerCase().includes(q));
        const matchP = (!onlyPending || !isOkPSSB(it.ps,it.sb));
        return matchQ && matchP;
      });

      for(const it of filtered.slice(0, 60)){
        const r1=document.createElement('div'); r1.className='item';
        r1.innerHTML='<div class="k">'+it.label+'</div><div>'+badge(it.ps)+'</div>';
        lps.appendChild(r1);
        const r2=document.createElement('div'); r2.className='item';
        r2.innerHTML='<div class="k">'+it.label+'</div><div>'+badge(it.sb)+'</div>';
        lsb.appendChild(r2);
      }
      if(!lps.childNodes.length){
        lps.innerHTML='<div class="item"><div class="k">(Sin coincidencias)</div><div></div></div>';
        lsb.innerHTML='<div class="item"><div class="k">(Sin coincidencias)</div><div></div></div>';
      }

      ps.appendChild(lps); sb.appendChild(lsb);
      wrap.appendChild(ps); wrap.appendChild(sb);
      return wrap;
    }

    if(area.type==='pssb'){
      details.appendChild(renderPSSB(area.items, area.pct_ps, area.pct_sb));
      grid.appendChild(card);
      continue;
    }

    if(area.type==='single'){
      const list=document.createElement('div');
      list.className='list';
      const filtered=(area.items||[]).filter(it=>{
        const matchQ = (!q || (it.label||'').toLowerCase().includes(q) || (it.st||'').toLowerCase().includes(q));
        const matchP = (!onlyPending || !isOk(it.st));
        return matchQ && matchP;
      });
      for(const it of filtered.slice(0, 80)){
        const row=document.createElement('div');
        row.className='item';
        row.innerHTML='<div class="k">'+it.label+'</div><div>'+badge(it.st)+'</div>';
        list.appendChild(row);
      }
      if(!list.childNodes.length) list.innerHTML='<div class="item"><div class="k">(Sin coincidencias)</div><div></div></div>';
      details.appendChild(list);
    }

    if(area.type==='group'){
      const groups=area.groups||{};
      const gKeys=Object.keys(groups);

      const tabs=document.createElement('div');
      tabs.className='tabs';
      details.appendChild(tabs);

      const body=document.createElement('div');
      details.appendChild(body);

      function showGroup(key){
        [...tabs.children].forEach(el=>el.classList.remove('active'));
        const btn=[...tabs.children].find(b=>b.dataset.key===key);
        if(btn) btn.classList.add('active');

        body.innerHTML='';
        const g=groups[key];
        if(!g) return;

        if(g.type==='pssb'){
          body.appendChild(renderPSSB(g.items, g.pct_ps, g.pct_sb));
        } else {
          const list=document.createElement('div');
          list.className='list';
          const filtered=(g.items||[]).filter(it=>{
            const matchQ = (!q || (it.label||'').toLowerCase().includes(q) || (it.st||'').toLowerCase().includes(q));
            const matchP = (!onlyPending || !isOk(it.st));
            return matchQ && matchP;
          });
          for(const it of filtered.slice(0, 80)){
            const row=document.createElement('div');
            row.className='item';
            row.innerHTML='<div class="k">'+it.label+'</div><div>'+badge(it.st)+'</div>';
            list.appendChild(row);
          }
          if(!list.childNodes.length) list.innerHTML='<div class="item"><div class="k">(Sin coincidencias)</div><div></div></div>';
          body.appendChild(list);
        }
      }

      gKeys.forEach((k,idx)=>{
        const b=document.createElement('div');
        b.className='tab'+(idx===0?' active':'');
        const g=groups[k];
        let gp=null;
        if(g && g.type==='pssb'){ gp = (Number(g.pct_ps)+Number(g.pct_sb))/2; }
        else if(g && typeof g.pct==='number'){ gp = g.pct; }
        b.textContent = (gp===null || isNaN(gp)) ? k : (k+' · '+Math.round(gp)+'%');
        b.dataset.key=k;
        b.addEventListener('click', ()=>showGroup(k));
        tabs.appendChild(b);
      });
      if(gKeys.length) showGroup(gKeys[0]);
    }

    grid.appendChild(card);
  }
}

    const on = btn.getAttribute('aria-pressed') === 'true';
    btn.setAttribute('aria-pressed', String(!on));
    render();
  });

// Add visual PEND for tasks without explicit status
function applyPendDefaults(){
  document.querySelectorAll('.item').forEach(row=>{
    const k=row.querySelector('.k');
    if(!k) return;
    const label=(k.textContent||'').trim();
    if(!label) return;

    // Ensure row has at least 2 cells
    if(row.children.length<2){
      const cell=document.createElement('div');
      row.appendChild(cell);
    }

    // Prefer status container: the last child. If last child is actually the label cell (rare), create a new status cell.
    let last=row.children[row.children.length-1];
    if(last && last.querySelector && last.querySelector('.k')){
      const cell=document.createElement('div');
      row.appendChild(cell);
      last=cell;
    }

    // If last contains some plain text (e.g., 'X' or empty) but no badge, convert it to a badge.
    let badge=last.querySelector && last.querySelector('.badge');
    if(!badge){
      const raw=(last.textContent||'').trim();
      last.innerHTML='';
      badge=document.createElement('span');
      badge.className='badge';
      badge.textContent=raw;
      last.appendChild(badge);
    }

    const txt=(badge.textContent||'').trim();
    const up=txt.toUpperCase();
    if(up==='OK' || up==='X'){
      badge.textContent='OK';
      badge.classList.remove('todo','na');
      badge.classList.add('x');
      return;
    }
    if(up==='N/A' || up==='N.A.' || up==='N.A'){
      badge.textContent='N/A';
      badge.classList.remove('todo','x');
      badge.classList.add('na');
      return;
    }
    if(up==='PEND'){
      badge.classList.remove('x','na');
      badge.classList.add('todo');
      return;
    }

    // Anything else (including empty) => PEND
    badge.textContent='PEND';
    badge.classList.remove('x','na');
    badge.classList.add('todo');
  });
}
const __render=window.render;
if(typeof __render==='function'){
  window.render=function(){
    __render();
    applyPendDefaults();
  }
}
window.addEventListener('load', ()=>{ try{applyPendDefaults();}catch(e){} });


// Extra enforcement for subgroups (post-DOM update)
function enforcePendHard(){
  document.querySelectorAll('.item').forEach(row=>{
    const k=row.querySelector('.k');
    if(!k) return;
    const label=(k.textContent||'').trim();
    if(!label) return;

    // Ensure 2 cells
    if(row.children.length<2){
      row.appendChild(document.createElement('div'));
    }
    let last=row.children[row.children.length-1];
    if(last && last.querySelector && last.querySelector('.k')){
      row.appendChild(document.createElement('div'));
      last=row.children[row.children.length-1];
    }

    if(!last.querySelector('.badge')){
      last.innerHTML='<span class="badge todo">PEND</span>';
    }
  });
}

// Wrap original render and also hook tab clicks
const __applyPendDefaults = window.applyPendDefaults;
window.applyPendDefaults = function(){
  if(typeof __applyPendDefaults==='function') __applyPendDefaults();
  enforcePendHard();
}

document.addEventListener('click', (ev)=>{
  if(ev.target.closest('.tab')){
    // after tab switch, DOM updates; enforce shortly after
    setTimeout(()=>{ try{applyPendDefaults();}catch(e){} }, 30);
    setTimeout(()=>{ try{applyPendDefaults();}catch(e){} }, 150);
  }
});

window.addEventListener('load', ()=>{
  setTimeout(()=>{ try{applyPendDefaults();}catch(e){} }, 30);
  setTimeout(()=>{ try{applyPendDefaults();}catch(e){} }, 150);
});

</script>
